name: Chollometro 300 Grados
on:
  schedule:
    - cron: '*/10 * * * *' # Cada 10 min
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Save Cache
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add vistos.txt
          git commit -m "Actualizar historial de chollos" || exit 0
          git push
